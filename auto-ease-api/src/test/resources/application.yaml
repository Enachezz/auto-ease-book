spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/db
    username: postgres
    password: 12345
    hikari:
      schema: db_test

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    user: postgres
    password: 12345
    schemas: db_test
    url: jdbc:postgresql://localhost:5432/db